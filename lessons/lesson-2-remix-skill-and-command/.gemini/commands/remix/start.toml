description = "기존 예제 Skill과 command를 자기 과제에 맞게 고쳐 쓰고 orchestration-agent skill 초안을 만드는 시작 command"
prompt = """
목표 작업: {{args}}

이번 목표는 Lesson 1의 예제를 버리는 것이 아니라, 현재 작업에 맞게 최소 수정하는 것이다.
그리고 수정 대상 skill을 하나의 agent capability처럼 다시 설명할 수 있어야 한다.
최종적으로는 Lesson 1 command에 있던 orchestration 역할을 `orchestration-agent` skill로 올려야 한다.
Lesson 2는 Lesson 1의 연속선이므로 `notes/progress-log.md`에 baseline과 오늘의 결정을 함께 남긴다.
가능하면 결과를 outputs/ 폴더에 저장하라.

remix-task와 orchestration-agent를 참고해 아래를 수행하라.

0. 현재 작업 폴더가 git repo 라면 local sync 상태를 먼저 점검한다.
   - branch / working tree / remote tracking 상태를 짧게 요약한다.
   - working tree가 깨끗하면 `git fetch origin`, `git pull --ff-only` 같은 local sync 시도 여부를 제안한다.
   - 로컬 변경이 있으면 pull 전에 정리가 필요하다고 명시한다.
1. 현재 작업을 1문장으로 다시 정리한다.
2. `notes/progress-log.md`에 아래를 먼저 남긴다.
   - Lesson 1 Baseline
   - 현재 mismatch 3개
   - 그대로 유지할 요소 3개
   - 오늘 바꿀 범위 1개
3. Lesson 1 흐름과 안 맞는 지점 3개를 찾는다.
4. 그대로 유지할 요소 3개를 찾는다.
5. Lesson 1 command가 맡던 orchestration 역할을 skill로 올리면 비어 있는 구조 3개를 찾는다.
6. Claude / Codex / Gemini / Agent Skills 관점 차이를 짧게 정리한다.
7. 새 `orchestration-agent` Skill 초안을 제안한다.
   - 이름
   - 역할
   - 트리거 설명
   - 입력 계약
   - 출력 계약
   - 절차
   - resources / references / assets
   - gotchas / guardrails
   - command에 있던 orchestration 판단이 Skill에 들어갔는지 명시
   - outputs/03_orchestration_skill.md 저장 제안
8. 프롬프트를 `상황 정보 + 선언적 지식 + 절차적 지식`으로 분해한다.
   - 상황 정보: 현재 과제, 기존 산출물 상태, repo/file/runtime, 현재 막힘
   - 앞 선언적 지식: 목표, 역할, 제약
   - 절차적 지식: 단계, 분기, 도구 사용
   - 뒤 선언적 지식: 출력 계약, 루브릭, 예시
   - outputs/04_prompt_decomposition.md 저장 제안
9. 새 command 초안을 제안한다.
   - command 이름
   - description
   - prompt 구조
   - orchestration 로직은 최소화하고 launcher/review wrapper 로 남기는지 명시
   - outputs/05_orchestration_command.md 저장 제안
10. 현재 mismatch 요약과 skill-as-agent 메모를 outputs/01_skill_as_agent_note.md 로 저장하라고 제안한다.
11. runtime 비교 메모를 outputs/02_runtime_comparison.md 로 저장하라고 제안한다.
12. `notes/progress-log.md`에 Action / Decision, Evidence / Saved outputs, Next Action을 같이 남기라고 제안한다.

마지막에 다음 10분 행동 3개를 제안하라.
"""
