description = "리서치부터 초안 작성까지 한 번에 시작하는 예시 command"
prompt = """
주제/작업: {{args}}

목표는 정답 생성이 아니라 학생의 작업 흐름을 진행하는 것이다.
가능하면 결과를 outputs/ 폴더에 저장하라.

1. research-task를 참고해 리서치를 시작한다.
   - 연구 질문 3개
   - 검색 키워드 10개
   - 자료 유형별 수집 계획
   - outputs/01_research_plan.md 저장 제안

2. organize-task를 참고해 정리한다.
   - 핵심 요약
   - 분류 체계
   - 비교표 또는 개요
   - outputs/02_outline.md 저장 제안

3. analysis-task를 참고해 분석한다.
   - 핵심 주장
   - 근거 구조
   - 반론 및 한계
   - outputs/03_argument_map.md 저장 제안

4. writing-task를 참고해 초안을 만든다.
   - 5문단 초안
   - 발표용 요약 bullet
   - outputs/04_draft.md 저장 제안

마지막에 다음 10분 행동 3개를 제안하라.
"""
